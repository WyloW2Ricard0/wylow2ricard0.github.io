version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wylow_portfolio
    ports:
      - "8000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.git
    environment:
      REACT_APP_BASENAME: /
      WATCHPACK_POLLING: "true"
      CI: "false"
    stdin_open: true
    tty: true
    command: npm start
