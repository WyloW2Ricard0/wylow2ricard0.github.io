<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Police Bauhaus 93</title>
    <style>
        body {
            font-family: Consolas, monospace;
            padding: 40px;
            background-color: #f5f5f5;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .test {
            margin: 20px 0;
            padding: 15px;
            background-color: #f9f9f9;
            border-left: 4px solid #1976d2;
        }
        
        .test-title {
            font-weight: bold;
            color: #1976d2;
            margin-bottom: 10px;
        }
        
        .bauhaus {
            font-family: 'Bauhaus 93', sans-serif;
            font-size: 32px;
            font-weight: 400;
        }
        
        .fallback {
            font-family: Consolas, monospace;
            font-size: 14px;
            color: #999;
        }
        
        .status {
            padding: 15px;
            border-radius: 4px;
            margin: 20px 0;
            font-weight: bold;
        }
        
        .success {
            background-color: #e8f5e9;
            color: #2e7d32;
        }
        
        .error {
            background-color: #ffebee;
            color: #c62828;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✓ Test Disponibilité Police</h1>
        
        <div class="test">
            <div class="test-title">Bauhaus 93 Standard</div>
            <div class="bauhaus">Ceci est du Bauhaus 93</div>
            <div class="fallback">(Si tu vois une police bloc/géométrique = OK | Si tu vois Consolas = NON disponible)</div>
        </div>
        
        <div class="test">
            <div class="test-title">Variantes testées</div>
            <div style="font-family: 'Bauhaus 93', sans-serif; font-size: 24px;">Bauhaus 93 (weight 400)</div>
            <div style="font-family: 'Bauhaus 93', sans-serif; font-size: 24px; font-weight: 700;">Bauhaus 93 (weight 700)</div>
        </div>
        
        <div id="status-div" class="status error">
            🔍 Vérification en cours...
        </div>
        
        <script>
            // Vérification de la disponibilité de la police
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const testString = 'Test';
            const baseFont = '20px Consolas, monospace';
            const bauhausFont = '20px "Bauhaus 93", sans-serif';
            
            ctx.font = baseFont;
            const baseWidth = ctx.measureText(testString).width;
            
            ctx.font = bauhausFont;
            const bauhausWidth = ctx.measureText(testString).width;
            
            const statusDiv = document.getElementById('status-div');
            
            // Si les largeurs sont différentes, c'est que Bauhaus 93 est chargée
            if (baseWidth !== bauhausWidth) {
                statusDiv.textContent = '✓ Bauhaus 93 est disponible sur ton système !';
                statusDiv.className = 'status success';
            } else {
                statusDiv.textContent = '✗ Bauhaus 93 n\'est PAS disponible sur ton système. Alternative suggérée: Impact, Arial Black, ou une police Google.';
                statusDiv.className = 'status error';
            }
        </script>
    </div>
</body>
</html>
